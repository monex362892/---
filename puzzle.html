<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Circus</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
    text-align: center;
}

#timer {
    font-size: 110px;
    font-weight: bold;
}

#text {
    font-size: 36px;
    margin-top: 20px;
    padding: 0 20px;
    line-height: 1.3;
}

.flash {
    animation: flash 0.2s infinite;
}

@keyframes flash {
    0% { background: black; }
    50% { background: red; }
    100% { background: black; }
}

/* ещё сильнее под маленькие экраны */
@media (max-width: 600px) {
    #timer {
        font-size: 140px;
    }

    #text {
        font-size: 44px;
    }
}
</style>
</head>

<body>

<div id="timer">60</div>
<div id="text"></div>

<script>
let time = 60;
let timerEl = document.getElementById("timer");
let textEl = document.getElementById("text");

let interval = setInterval(() => {
    time--;
    timerEl.innerText = time;

    if (time <= 0) {
        clearInterval(interval);
        startSequence();
    }
}, 1000);

function startSequence() {
    document.body.classList.add("flash");

    setTimeout(() => {
        document.body.classList.remove("flash");
        timerEl.style.display = "none";

        textEl.innerText = "Лоренцо вас нашел…";

        setTimeout(() => {
            textEl.style.fontSize = "60px";
            textEl.style.color = "red";
            textEl.innerText = "БЕГИ!RUN!RUN!";

            setTimeout(() => {
                textEl.style.fontSize = "34px";
                textEl.style.color = "white";
                textEl.innerText = "TikTokBlackCircus";
            }, 2000);

        }, 2000);

    }, 2000);
}
</script>

</body>
</html>
