<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Circus</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
    transition: background 0.2s ease;
}

#timer {
    font-size: 120px;
    font-weight: bold;
}

#text {
    font-size: 42px;
    text-align: center;
    margin-top: 20px;
}

#topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white;
    color: black;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    font-size: 18px;
    z-index: 10;
}

.redFlash {
    background: red !important;
}
</style>
</head>

<body>

<div id="topbar">🥳 Lorenzo Black Circus 🥳</div>

<div id="timer">30</div>
<div id="text"></div>

<script>
let time = 30;
let timerEl = document.getElementById("timer");
let textEl = document.getElementById("text");
let topbar = document.getElementById("topbar");

function startTimer() {
    let interval = setInterval(() => {
        time--;
        timerEl.innerText = time;
        timerEl.style.color = `rgb(255, ${time * 8}, ${time * 8})`;

        if (time <= 0) {
            clearInterval(interval);
            redSequence();
        }
    }, 1000);
}

function redSequence() {
    document.body.classList.add("redFlash");
    timerEl.style.display = "none";

    setTimeout(() => {
        document.body.classList.remove("redFlash");

        textEl.innerText = "Лоренцо вас нашел…";

        setTimeout(() => {
            textEl.style.fontSize = "70px";
            textEl.style.color = "red";
            textEl.innerText = "БЕГИ!";

            setTimeout(() => {
                textEl.style.fontSize = "34px";
                textEl.style.color = "white";
                textEl.innerText = "TikTokBlackCircus";

                topbar.style.display = "flex";

            }, 2000);

        }, 2000);

    }, 5000);
}

startTimer();
</script>

</body>
</html>
