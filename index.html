<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cirque</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

#box {
    display: flex;
    gap: 10px;
}

input {
    padding: 10px;
    border: 1px solid white;
    background: black;
    color: white;
    outline: none;
    text-align: center;
}

button {
    padding: 10px;
    background: white;
    border: none;
    cursor: pointer;
}

#msg {
    margin-top: 20px;
}
</style>
</head>
<body>

<div id="box">
    <input id="code" placeholder="код">
    <button onclick="check()">Купить билет</button>
</div>

<div id="msg"></div>

<script>
const correctCode = "1234"; // ← тут меняешь код

function check() {
    const val = document.getElementById("code").value;
    const msg = document.getElementById("msg");

    if (val === correctCode) {
        msg.innerText = "Лоренцо ничего не заметил";

        setTimeout(() => {
            window.location.href = "puzzle.html";
        }, 1500);

    } else {
        msg.innerText = "Лоренцо что-то заподозрил";
    }
}
</script>

</body>
</html>
